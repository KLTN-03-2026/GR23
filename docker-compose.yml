services:
  mssql:
    container_name: ailexba_mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  api:
    container_name: ailexba_api
    build:
      context: ./alilexba_backend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./alilexba_backend:/app
      - api_nuget:/root/.nuget/packages
    ports:
      - "${API_HOST_PORT:-5080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      # DOTNET_STARTUP_PROJECT: ${DOTNET_STARTUP_PROJECT}
      CONNECTION_STRING: Server=mssql;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      # ConnectionStrings__DefaultConnection: >-
        # Server=mssql,1433;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: ailexba_frontend
    build:
      context: ./ailexba_frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./ailexba_frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "${WATCHPACK_POLLING:-true}"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
      NEXT_PUBLIC_BACKEND_API_URL: ${BACKEND_API_URL:-http://localhost:${API_HOST_PORT:-5080}}
    depends_on:
      - api
    restart: unless-stopped

  dbgate:
    container_name: ailexba_dbgate
    image: dbgate/dbgate:latest
    ports:
      - "3001:3000"
    environment:
      SKIP_ALL_AUTH: "1"
      CONNECTIONS: "con1"
      LABEL_con1: "Ailexba MSSQL"
      ENGINE_con1: "mssql@dbgate-plugin-mssql"
      SERVER_con1: "mssql"
      PORT_con1: "1433"
      USER_con1: "sa"
      PASSWORD_con1: "${MSSQL_SA_PASSWORD}"
      DATABASE_con1: "${DB_NAME}"
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mssql_data:
  api_nuget:
  frontend_node_modules:
